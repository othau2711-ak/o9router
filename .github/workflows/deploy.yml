      ||
      (github.event_name == 'schedule' && github.event.schedule == '3 16 * * *' && github.repository == 'hauo8627/o9router')
      ||
      (github.event_name == 'schedule' && github.event.schedule == '3 17 * * *' && github.repository == 'hauo8627/o9router')
